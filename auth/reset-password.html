<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>استعادة كلمة المرور — dm</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h2>استعادة كلمة المرور</h2>
      <form id="resetForm" onsubmit="authSendReset(event)">
        <label>أدخل بريدك الإلكتروني لاستلام رابط الاستعادة</label>
        <input id="resetEmail" type="email" required>
        <button class="btn btn-primary" type="submit">إرسال البريد</button>
      </form>
      <p><a href="/auth/login.html">العودة لتسجيل الدخول</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
